repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: "v5.0.0"
      hooks:
          - id: check-case-conflict
          - id: check-merge-conflict
          - id: end-of-file-fixer
          - id: trailing-whitespace

    - repo: local
      hooks:
          - id: nox-lint
            name: Lint
            entry: uv run nox -s lint --
            language: system
            types: [python]
            require_serial: true
          - id: nox-format
            name: Format
            entry: uv run nox -s format --
            language: system
            types: [python]
            require_serial: true
          - id: nox-tests3.10
            name: Tests (Python 3.10)
            pass_filenames: false
            entry: uv run nox -s tests-3.10 -- -q tests
            language: system
            types: [python]
          - id: nox-tests3.14
            name: Tests (Python 3.14)
            pass_filenames: false
            entry: uv run nox -s tests-3.14 -- -q tests
            language: system
            types: [python]
